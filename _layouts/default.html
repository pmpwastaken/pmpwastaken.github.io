<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | pmpwastaken</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <!-- Using relative paths so it works everywhere -->
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

    <!-- 1. The Living Background -->
    <canvas id="bg-canvas" class="living-bg"></canvas>
    <div class="living-grain"></div>

    <!-- 2. The Data Widget Dropdown -->
    <div id="widget-pane" class="widget-pane material-glass-nav" aria-hidden="true">
        <div class="swiss-container">
            <div class="swiss-grid widget-zone">
                <div class="col-span-12">
                    <span class="ui-label" style="color: var(--text-secondary); display: block; margin-bottom: 8px;">[ Global Time - 24H ]</span>
                    <div class="widget-grid" style="margin-bottom: var(--space-lg);" id="clock-grid"></div>

                    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;">
                        <span class="ui-label" style="color: var(--text-secondary);">[ Markets: FX & Crypto ]</span>
                        <span class="ui-label" style="font-size: 0.65rem; color: var(--accent-red);" id="fx-status">Updating...</span>
                    </div>
                    <div class="widget-grid" style="margin-bottom: var(--space-lg);" id="fx-grid"></div>

                    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;">
                        <span class="ui-label" style="color: var(--text-secondary);">[ Equities (Priced in CHF) ]</span>
                        <span class="ui-label" style="font-size: 0.65rem; color: var(--accent-red);" id="stock-status">Fetching...</span>
                    </div>
                    <div class="widget-grid" id="stock-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. The Global Navigation -->
    <nav class="global-nav material-glass-nav">
        <div class="nav-links">
            <a href="{{ '/index.html' | relative_url }}" class="nav-link">home</a>
            <a href="{{ '/about.html' | relative_url }}" class="nav-link">about</a>
            <a href="{{ '/blog.html' | relative_url }}" class="nav-link">blog</a>
            <a href="{{ '/projects.html' | relative_url }}" class="nav-link">projects</a>
            <a href="{{ '/orgs.html' | relative_url }}" class="nav-link">orgs</a>
            <a href="{{ '/affiliates.html' | relative_url }}" class="nav-link">affiliates</a>
            <button id="widget-toggle" class="nav-link nav-btn" aria-expanded="false">widgets</button>
        </div>
    </nav>

    <!-- 4. THE CONTENT INJECTOR -->
    <!-- This is where Jekyll will automatically insert your specific page content -->
    <main class="swiss-container">
        <div class="swiss-grid" id="app-root">
            {{ content }}
        </div>
    </main>

    <!-- 5. The Magic Audio Island -->
    <div class="island-widget material-glass-pane">
        <!-- Notice the dynamic audio tag below. It checks the page front-matter for a track, or defaults to audio.mp3 -->
        <audio id="island-audio" src="{{ page.audio | default: 'audio.mp3' | relative_url }}" loop autoplay></audio>

        <div class="island-compact" id="island-compact-view">
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
        </div>

        <div class="island-expanded">
            <!-- Dynamically fetch art, default to profile.png if none provided -->
            <div class="island-art" style="background-image: url('{{ page.audio_art | default: 'images/profile.png' | relative_url }}'); background-size: cover;"></div>

            <div class="island-info">
                <!-- Dynamically fetch title, default to System Audio -->
                <div class="island-title">{{ page.audio_title | default: 'System Audio' }}</div>

                <!-- Added an ID here so JavaScript can change the text -->
                <a href="#" class="island-subtitle" id="audio-status">Playing...</a>

                <div class="island-progress-bg">
                    <div class="island-progress-fill" id="island-progress"></div>
                </div>
            </div>
            <div class="island-controls">
                <span id="btn-prev" class="ctrl-btn" aria-label="Restart Track">[ &lt;&lt; ]</span>
                <span id="btn-play" class="ctrl-btn" aria-label="Play/Pause">[ || ]</span>
                <span id="btn-next" class="ctrl-btn" aria-label="Skip Forward">[ &gt;&gt; ]</span>
            </div>
        </div>
    </div>

    <!-- 6. Global Scripts -->
    <script src="{{ '/app.js' | relative_url }}"></script>
</body>
</html>
